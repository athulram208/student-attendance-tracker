<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h1>Verify OTP</h1>
            <p class="subtitle center-text">Reset admin password</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash-wrap">
                        {% for message in messages %}
                            <div class="flash-message">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" class="login-form">
                <input type="text" name="otp" placeholder="Enter OTP" maxlength="6" required>
                <input type="password" name="password" placeholder="New Admin Password" required>
                <button type="submit" class="btn primary full-btn">Reset Password</button>
            </form>

            <div style="text-align:center; margin-top:12px;">
                <a href="{{ url_for('admin_login') }}" class="nav-link secondary">
                    Back to Admin Login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
