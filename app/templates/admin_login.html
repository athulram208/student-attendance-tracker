<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Attendance System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h1>Admin Login</h1>
            <p class="subtitle center-text">Only admin can login here</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash-wrap">
                        {% for message in messages %}
                            <div class="flash-message">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" class="login-form">
                <input type="text" name="username" placeholder="Admin Username" required>
                <input type="password" name="password" placeholder="Admin Password" required>
                <button type="submit" class="btn primary full-btn">Login</button>
            </form>

            <div style="text-align:center; margin-top:12px;">
                <a href="{{ url_for('forgot_password') }}" class="nav-link secondary">
                    Forgot Password?
                </a>
            </div>

            <div style="text-align:center; margin-top:12px;">
                <a href="{{ url_for('login') }}" class="nav-link secondary">
                    Back to Student / Teacher Login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
